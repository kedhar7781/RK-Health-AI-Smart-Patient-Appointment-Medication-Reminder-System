<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RK Health Patient Portal</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-blob auth-blob-1"></div>
        <div class="auth-blob auth-blob-2"></div>
        
        <div class="auth-container">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fa-solid fa-heart-pulse"></i>
                </div>
                <h1 class="auth-title">RK Health</h1>
                <p class="auth-subtitle">AI Smart Patient Portal</p>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div style="position: relative;">
                        <span style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-secondary);">
                            <i class="fa-solid fa-user"></i>
                        </span>
                        <input type="text" id="username" class="form-control" style="padding-left: 40px;" placeholder="Enter your username" required>
                    </div>
                </div>
                
                <div class="form-group" style="margin-bottom: 24px;">
                    <label for="password">Password</label>
                    <div style="position: relative;">
                        <span style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-secondary);">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" id="password" class="form-control" style="padding-left: 40px;" placeholder="Enter your password" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 8px;">
                    <i class="fa-solid fa-right-to-bracket"></i> Login
                </button>
            </form>
            
            <div class="auth-footer">
                Don't have an account? <a href="/register">Register here</a>
            </div>
        </div>
    </div>
    
    <div class="toast-container" id="toast-container"></div>

    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('login-form');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                
                const success = await Auth.login(username, password);
                if (success) {
                    window.location.href = '/';
                }
            });
        });
    </script>
</body>
</html>
